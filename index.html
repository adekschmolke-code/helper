<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        const language = JSON.parse(localStorage.getItem("helper_language")) || "en";
        document.documentElement.lang = language;
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span data-i18n="navArticles">Articles</span></a>
          <a href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span data-i18n="navNewList">New list</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span data-i18n="navLists">Lists</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Settings</span></a>
        </div>
      </nav>
    </header>

    <main class="hero">
      <section class="welcome" aria-labelledby="welcome-title">
        <p class="eyebrow" data-i18n="homeEyebrow">Welcome back</p>
        <h1 id="welcome-title" data-i18n="homeTitle">Good to see you.</h1>
        <p data-i18n="homeDescription">
          Create new lists, keep track of everything, and find it again when you need it.
        </p>
        <div class="actions">
          <a class="button primary" href="neue-liste.html" data-i18n="homeNewList">New list</a>
          <a class="button secondary" href="listen.html" data-i18n="homeViewLists">View lists</a>
        </div>
      </section>
    </main>
  </body>
</html>
