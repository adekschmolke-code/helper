<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Artikel | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        const language = JSON.parse(localStorage.getItem("helper_language")) || "en";
        document.documentElement.lang = language;
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="artikel">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a class="active" href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span data-i18n="navArticles">Articles</span></a>
          <a href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span data-i18n="navNewList">New list</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span data-i18n="navLists">Lists</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Settings</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="artikel-title">
        <p class="eyebrow" data-i18n="articlesEyebrow">Manage articles</p>
        <h1 id="artikel-title" data-i18n="articlesTitle">Your articles</h1>
        <p data-i18n="articlesDescription">Add articles and remove anything you no longer need.</p>
      </section>

      <section class="panel" aria-label="Add article" data-i18n-aria="addArticle">
        <form class="form-row" data-article-form>
          <label class="sr-only" for="article-name" data-i18n="articleName">Article name</label>
          <input id="article-name" data-article-input type="text" placeholder="New article" data-i18n-placeholder="newArticlePlaceholder" required />
          <button class="button primary icon-button" type="submit" aria-label="Add article" title="Add article" data-i18n-aria="addArticle">+</button>
        </form>
      </section>

      <ul class="item-list" data-article-list aria-label="Artikelliste"></ul>
    </main>
  </body>
</html>
