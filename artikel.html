<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Verwalte deine gespeicherten Artikel lokal im Browser." />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Artikel | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="artikel">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a class="active" href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span>Artikel</span></a>
          <a href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span>Neue Liste</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span>Listen</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Einstellungen</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="artikel-title">
        <p class="eyebrow">Artikel verwalten</p>
        <h1 id="artikel-title">Deine Artikel</h1>
        <p>F&uuml;ge Artikel hinzu und entferne alles, was du nicht mehr brauchst.</p>
      </section>

      <section class="panel" aria-label="Artikel hinzuf&uuml;gen">
        <form class="form-row" data-article-form>
          <label class="sr-only" for="article-name">Artikelname</label>
          <input id="article-name" data-article-input type="text" placeholder="Neuer Artikel" required />
          <button class="button primary icon-button" type="submit" aria-label="Artikel hinzuf&uuml;gen" title="Artikel hinzuf&uuml;gen">+</button>
        </form>
      </section>

      <ul class="item-list" data-article-list aria-label="Artikelliste"></ul>
    </main>
  </body>
</html>
