<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Erstelle eine neue lokale Liste und trage Mengen zu deinen Artikeln ein." />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Neue Liste erstellen | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="catalog.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="neue-liste">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span>Artikel</span></a>
          <a class="active" aria-current="page" href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span>Neue Liste</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span>Listen</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Einstellungen</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="new-list-title">
        <p class="eyebrow" data-category-label>Liste</p>
        <h1 id="new-list-title">Neue Liste</h1>
      </section>

      <nav class="category-switch" aria-label="Bereich ausw&auml;hlen">
        <a class="button secondary" href="neue-liste.html" data-category-link="beverages">Getr&auml;nke</a>
        <a class="button secondary" href="neue-liste.html" data-category-link="cigarettes">Zigaretten</a>
      </nav>

      <section class="panel" data-new-list-form>
        <div class="form-row search-row list-search-row">
          <label class="sr-only" for="list-search">Artikel in der Liste suchen</label>
          <input id="list-search" data-list-search type="search" placeholder="Suchen" autocomplete="off" />
        </div>
        <div class="quantity-list" data-list-articles></div>
        <div class="actions left">
          <p class="form-status" data-status aria-live="polite"></p>
        </div>
      </section>
    </main>
  </body>
</html>
