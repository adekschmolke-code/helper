<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Neue Liste erstellen | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        const language = JSON.parse(localStorage.getItem("helper_language")) || "en";
        document.documentElement.lang = language;
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="neue-liste">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span data-i18n="navArticles">Articles</span></a>
          <a class="active" href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span data-i18n="navNewList">New list</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span data-i18n="navLists">Lists</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Settings</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="new-list-title">
        <p class="eyebrow" data-i18n="newListEyebrow">New list</p>
        <h1 id="new-list-title" data-i18n="newListTitle">Enter quantities</h1>
        <p data-i18n="newListDescription">Enter the quantity next to each article. Empty quantities are not saved.</p>
      </section>

      <section class="panel" aria-label="Add article" data-i18n-aria="addArticle">
        <form class="form-row" data-inline-article-form>
          <label class="sr-only" for="inline-article-name" data-i18n="articleName">Article name</label>
          <input id="inline-article-name" data-inline-article-input type="text" placeholder="Add article" data-i18n-placeholder="addArticle" required />
          <button class="button secondary icon-button" type="submit" aria-label="Add article" title="Add article" data-i18n-aria="addArticle">+</button>
        </form>
      </section>

      <form class="panel" data-new-list-form>
        <div class="quantity-list" data-list-articles></div>
        <div class="actions left">
          <button class="button primary icon-button" type="submit" aria-label="Save list" title="Save list" data-i18n-aria="saveList">&#10003;</button>
          <p class="form-status" data-status aria-live="polite"></p>
        </div>
      </form>
    </main>
  </body>
</html>
