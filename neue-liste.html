<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Neue Liste erstellen | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="neue-liste">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span>Artikel</span></a>
          <a class="active" href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span>Neue Liste</span></a>
          <a href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span>Listen</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Einstellungen</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="new-list-title">
        <p class="eyebrow">Neue Liste</p>
        <h1 id="new-list-title">Mengen eintragen</h1>
        <p>Trage neben den Artikeln die gew&uuml;nschte Menge ein. Leere Mengen werden nicht gespeichert.</p>
      </section>

      <section class="panel" aria-label="Artikel spontan hinzuf&uuml;gen">
        <form class="form-row" data-inline-article-form>
          <label class="sr-only" for="inline-article-name">Artikelname</label>
          <input id="inline-article-name" data-inline-article-input type="text" placeholder="Artikel hinzuf&uuml;gen" required />
          <button class="button secondary icon-button" type="submit" aria-label="Artikel hinzuf&uuml;gen" title="Artikel hinzuf&uuml;gen">+</button>
        </form>
      </section>

      <form class="panel" data-new-list-form>
        <div class="quantity-list" data-list-articles></div>
        <div class="actions left">
          <button class="button primary icon-button" type="submit" aria-label="Liste speichern" title="Liste speichern">&#10003;</button>
          <p class="form-status" data-status aria-live="polite"></p>
        </div>
      </form>
    </main>
  </body>
</html>
