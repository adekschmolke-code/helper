<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Helper" />
    <title>Listen | Helper</title>
    <script>
      try {
        const theme = JSON.parse(localStorage.getItem("helper_theme"));
        const language = JSON.parse(localStorage.getItem("helper_language")) || "en";
        document.documentElement.lang = language;
        if (theme) document.documentElement.dataset.theme = theme;
      } catch {}
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="listen">
    <header class="site-header">
      <nav class="navbar" aria-label="Hauptnavigation">
        <a class="brand" href="index.html">Helper</a>
        <div class="nav-links">
          <a href="artikel.html"><span class="nav-icon" aria-hidden="true">&#9633;</span><span data-i18n="navArticles">Articles</span></a>
          <a href="neue-liste.html"><span class="nav-icon" aria-hidden="true">+</span><span data-i18n="navNewList">New list</span></a>
          <a class="active" href="listen.html"><span class="nav-icon" aria-hidden="true">&#9776;</span><span data-i18n="navLists">Lists</span></a>
          <a href="settings.html"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Settings</span></a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-heading" aria-labelledby="lists-title">
        <p class="eyebrow" data-i18n="listsEyebrow">Saved lists</p>
        <h1 id="lists-title" data-i18n="navLists">Lists</h1>
        <p data-i18n="listsDescription">Open saved lists, edit quantities, or delete old entries.</p>
      </section>

      <section class="saved-lists" data-saved-lists aria-label="Saved lists" data-i18n-aria="listsEyebrow"></section>
    </main>
  </body>
</html>
